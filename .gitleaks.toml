# Gitleaks configuration for historical-date-sort
title = "historical-date-sort secrets detection"

# Allow specific patterns
allowlist = [
  # Package.json scripts may contain npm run commands
  {file = "package\\.json"},
  # Test files may contain example tokens  
  {path = "test/.*"},
  {path = "__tests__/.*"},
  {path = ".*\\.test\\..*"},
  {path = ".*\\.spec\\..*"}
]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:api[_-]?key|secret|token|password)[=:]\s*["']?[a-z0-9]{32,}["']?'''
tags = ["key", "secret"]

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''(gh[ps]_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59})'''
tags = ["key", "github"]

[[rules]]
id = "npm-token"
description = "NPM Token"
regex = '''npm_[a-zA-Z0-9]{36}'''
tags = ["key", "npm"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["key", "aws"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN[ A-Z]*PRIVATE KEY-----'''
tags = ["key", "crypto"]